<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>疼痛智能问诊系统</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="header">
    <h1>疼痛智能问诊</h1>
    <p>AI 辅助疼痛分诊与慢病管理</p>
  </div>

  <div class="container">
    <div class="card">
      <div class="card-title">欢迎使用</div>
      <p style="color: var(--text-muted); margin-bottom: 16px;">
        本系统基于 AI 技术辅助疼痛分诊，帮助患者快速评估疼痛风险等级，并提供分诊建议。
      </p>
      <div class="btn-group">
        <a href="consult.html" class="btn btn-primary btn-block">开始疼痛问诊</a>
        <a href="records.html" class="btn btn-primary btn-block" style="background: var(--success);">查看健康档案</a>
        <a href="stats.html" class="btn btn-primary btn-block" style="background: var(--info);">后台统计</a>
      </div>
    </div>

    <div class="card">
      <div class="card-title">系统功能</div>
      <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px;">
        <div style="padding: 16px; background: var(--bg); border-radius: 8px;">
          <strong>智能问诊</strong><br>
          <span style="font-size: 0.9rem; color: var(--text-muted);">引导式提问，自动采集疼痛信息</span>
        </div>
        <div style="padding: 16px; background: var(--bg); border-radius: 8px;">
          <strong>风险分级</strong><br>
          <span style="font-size: 0.9rem; color: var(--text-muted);">Ⅰ-Ⅳ级风险自动判断</span>
        </div>
        <div style="padding: 16px; background: var(--bg); border-radius: 8px;">
          <strong>自动分诊</strong><br>
          <span style="font-size: 0.9rem; color: var(--text-muted);">推荐科室与就诊优先级</span>
        </div>
        <div style="padding: 16px; background: var(--bg); border-radius: 8px;">
          <strong>健康档案</strong><br>
          <span style="font-size: 0.9rem; color: var(--text-muted);">历次问诊记录自动归档</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
